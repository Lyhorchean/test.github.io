<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Ang Pao</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        .container {
            perspective: 1000px;
            cursor: pointer;
            padding: 20px;
            max-width: 100%;
        }

        .angpao {
            width: min(300px, 90vw);
            height: min(400px, 80vh);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .angpao.opened {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 20px;
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        .front {
            background: linear-gradient(-45deg, #ff0000, #ff4444, #ff0000, #ff2222);
            color: #ffd700;
            font-size: clamp(18px, 4vw, 24px);
            text-align: center;
        }

        .back {
            background: linear-gradient(-45deg, #ff4444, #ff0000, #ff2222, #ff0000);
            transform: rotateY(180deg);
            color: #ffd700;
            font-size: clamp(16px, 3.5vw, 20px);
            text-align: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .chinese-character {
            font-size: clamp(36px, 8vw, 48px);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #ffd700;
            }
            to {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ffd700;
            }
        }

        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .heart {
            position: absolute;
            font-size: clamp(16px, 4vw, 24px);
            color: #ff4444;
            opacity: 0;
            animation: float 4s ease-in infinite;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.3));
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1) rotate(360deg);
                opacity: 0;
            }
        }

        .message {
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .opened .message {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="container">
        <div class="angpao" id="angpao">
            <div class="front">
                <div>
                    <div class="chinese-character">福</div>
                    <p>Click to Open<br>Your Ang Pao</p>
                </div>
            </div>
            <div class="back">
                <div class="message">
                    <p>Dear Sweetheart,<br><br>
                    Wishing you happiness, prosperity, and all the best things in life!<br><br>
                    With love ❤️<br><br>
                    ❤️ I love you ❤️</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const angpao = document.getElementById('angpao');
        const heartsContainer = document.getElementById('hearts');
        let isOpened = false;

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        let heartsInterval;

        function startHearts() {
            if (!heartsInterval) {
                heartsInterval = setInterval(createHeart, 300);
            }
        }

        function stopHearts() {
            if (heartsInterval) {
                clearInterval(heartsInterval);
                heartsInterval = null;
            }
        }

        angpao.addEventListener('click', () => {
            if (!isOpened) {
                angpao.classList.add('opened');
                startHearts();
                isOpened = true;
            } else {
                angpao.classList.remove('opened');
                stopHearts();
                isOpened = false;
            }
        });
    </script>
</body>
</html>
