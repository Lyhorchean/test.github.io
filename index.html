<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us for Jogging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .invitation-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .invitation-card::before {
            content: '🏃‍♂️';
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            opacity: 0.2;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 800;
            background: linear-gradient(45deg, #2c3e50, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .details {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            border-left: 5px solid #3498db;
        }

        .info-item {
            margin: 15px 0;
            color: #34495e;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .label {
            font-weight: bold;
            min-width: 80px;
            color: #2980b9;
        }

        .note {
            margin-top: 30px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 10px;
            color: #34495e;
            font-style: italic;
            text-align: center;
        }

        @media (max-width: 480px) {
            .invitation-card {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .info-item {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="invitation-card">
        <h1>Let's Go Jogging!</h1>
        
        <div class="details">
            <div class="info-item">
                <span class="label">When:</span>
                <span>Tuesday, February 4th at 6:30 PM</span>
            </div>
            
            <div class="info-item">
                <span class="label">Where:</span>
                <span>វត្តព្រះបារមីវង្កតបុរី</span>
            </div>
            
            <div class="info-item">
                <span class="label">Duration:</span>
                <span>30 minutes</span>
            </div>
        </div>

        <p class="note">Please bring water and wear comfortable running shoes</p>
    </div>
</body>
</html>
