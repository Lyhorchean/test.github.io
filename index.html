<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Ang Pao</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            perspective: 1000px;
            cursor: pointer;
        }

        .angpao {
            width: 300px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s;
        }

        .angpao.opened {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .front {
            background: linear-gradient(45deg, #ff0000, #ff4444);
            color: #ffd700;
            font-size: 24px;
            text-align: center;
            padding: 20px;
        }

        .back {
            background: linear-gradient(45deg, #ff4444, #ff0000);
            transform: rotateY(180deg);
            color: #ffd700;
            font-size: 20px;
            text-align: center;
            padding: 20px;
        }

        .decoration {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid #ffd700;
            border-radius: 50%;
        }

        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; }

        .chinese-character {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff4444;
            opacity: 0;
            animation: float 4s ease-in infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="container">
        <div class="angpao" id="angpao">
            <div class="front">
                <div class="decoration top-left"></div>
                <div class="decoration top-right"></div>
                <div class="decoration bottom-left"></div>
                <div class="decoration bottom-right"></div>
                <div>
                    <div class="chinese-character">福</div>
                    <p>Click to Open<br>Your Ang Pao</p>
                </div>
            </div>
            <div class="back">
                <div class="decoration top-left"></div>
                <div class="decoration top-right"></div>
                <div class="decoration bottom-left"></div>
                <div class="decoration bottom-right"></div>
                <p>Dear Sweetheart,<br><br>
                Wishing you happiness, prosperity, and all the best things in life!<br><br>
                With love ❤️<br><br>
                ❤️ I love you ❤️</p>
            </div>
        </div>
    </div>

    <script>
        const angpao = document.getElementById('angpao');
        const heartsContainer = document.getElementById('hearts');
        let isOpened = false;

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        function startHearts() {
            setInterval(createHeart, 300);
        }

        angpao.addEventListener('click', () => {
            if (!isOpened) {
                angpao.classList.add('opened');
                startHearts();
                isOpened = true;
            } else {
                angpao.classList.remove('opened');
                isOpened = false;
            }
        });
    </script>
</body>
</html>
